name: CI/CD - Auction System

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build shared module
        run: mvn -pl shared install -q

      - name: Build & test server
        run: mvn -pl server test -q
        env:
          CI: true

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: server/target/surefire-reports/

      - name: Build server JAR
        run: mvn -pl server package -DskipTests -q

      - name: Build client JAR (skip tests, needs display)
        run: mvn -pl client package -DskipTests -q
        continue-on-error: true  # JavaFX needs display

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: auction-server-jar
          path: server/target/auction-server-jar-with-dependencies.jar

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Check test coverage
        run: |
          mvn -pl shared install -q
          mvn -pl server test -q
          echo "Tests passed ✅"

      - name: Verify no compilation warnings (strict)
        run: |
          mvn -pl shared,server compile 2>&1 | grep -i "warning" | wc -l | \
          xargs -I{} sh -c 'echo "Compiler warnings: {}"; exit 0'
